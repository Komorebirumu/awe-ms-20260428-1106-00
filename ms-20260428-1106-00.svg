<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2196F3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFC107;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E91E63;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="#f0f2f5" />

  <!-- Background Abstract Shapes -->
  <g transform="translate(100, 150) scale(0.8)">
    <circle cx="150" cy="150" r="80" fill="url(#gradient1)" opacity="0.7"/>
    <rect x="250" y="50" width="120" height="120" rx="20" fill="url(#gradient2)" opacity="0.6" transform="rotate(30 310 110)"/>
    <polygon points="50,250 100,300 0,300" fill="#FF9800" opacity="0.5" transform="translate(350, 100)"/>
  </g>

  <!-- Main Illustration - AI and Art Generation -->
  <g transform="translate(250, 200) scale(1.2)">
    <!-- AI Brain/Chip Icon -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="80" height="80" rx="15" fill="#3F51B5"/>
      <circle cx="20" cy="20" r="8" fill="#FFF"/>
      <circle cx="60" cy="20" r="8" fill="#FFF"/>
      <circle cx="20" cy="60" r="8" fill="#FFF"/>
      <circle cx="60" cy="60" r="8" fill="#FFF"/>
      <rect x="30" y="10" width="20" height="20" fill="#FFF" rx="5"/>
      <rect x="10" y="30" width="20" height="20" fill="#FFF" rx="5"/>
      <rect x="50" y="30" width="20" height="20" fill="#FFF" rx="5"/>
      <rect x="30" y="50" width="20" height="20" fill="#FFF" rx="5"/>
    </g>

    <!-- Connecting Lines -->
    <line x1="80" y1="40" x2="120" y2="40" stroke="#757575" stroke-width="3" stroke-dasharray="5,5"/>
    <line x1="100" y1="60" x2="100" y2="100" stroke="#757575" stroke-width="3" stroke-dasharray="5,5"/>

    <!-- Art Palette/Canvas Icon -->
    <g transform="translate(100, 50)">
      <path d="M 0 0 L 80 0 L 80 100 L 0 100 Z" fill="#B0BEC5" stroke="#455A64" stroke-width="2"/>
      <circle cx="20" cy="80" r="10" fill="#FFEB3B"/>
      <circle cx="50" cy="70" r="10" fill="#F44336"/>
      <circle cx="70" cy="40" r="10" fill="#2196F3"/>
    </g>
  </g>

  <!-- Home Decor Element - Abstract Frame -->
  <g transform="translate(550, 300) scale(0.8)">
    <rect x="0" y="0" width="150" height="150" fill="#ECEFF1" stroke="#78909C" stroke-width="4" rx="15"/>
    <!-- Abstract Art within frame -->
    <g transform="translate(15, 15) scale(0.7)">
      <circle cx="30" cy="30" r="25" fill="url(#gradient1)" opacity="0.9"/>
      <rect x="40" y="10" width="50" height="50" rx="8" fill="url(#gradient2)" opacity="0.8" transform="rotate(-20 65 35)"/>
      <polygon points="10,50 30,70 0,70" fill="#607D8B" opacity="0.7" transform="translate(60, 30)"/>
    </g>
  </g>

  <!-- Text -->
  <text x="50%" y="80" font-family="Arial, sans-serif" font-size="36" fill="#333" text-anchor="middle" font-weight="bold">AI-Powered</text>
  <text x="50%" y="130" font-family="Arial, sans-serif" font-size="30" fill="#555" text-anchor="middle">Niche Abstract Art Generator</text>
  <text x="50%" y="180" font-family="Arial, sans-serif" font-size="24" fill="#777" text-anchor="middle">for Home Decor</text>

</svg>